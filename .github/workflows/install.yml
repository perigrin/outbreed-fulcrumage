name: Test Installation

on:
  push:
    branches: [ "main", "alien-duckdb" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        perl-version: ['5.40']

    runs-on: ${{ matrix.os }}
    name: Perl ${{ matrix.perl-version }} on ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}
          install-modules-with: cpanm
          enable-modules-cache: true
      
      - name: Install build essentials (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install C compiler (macOS)
        if: runner.os == 'macOS'
        run: xcode-select --install || true
      
      # Windows requires specific compiler setup
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1.1
      
      - name: Setup perl environment (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64

      # Install core modules that might be problematic on certain platforms
      - name: Install prerequisite modules
        uses: perl-actions/install-with-cpm@v1.7
        with:
          install: |
            Module::Pluggable
            Path::Tiny
            Alien::Base
            Alien::Build
            ExtUtils::MakeMaker
            ExtUtils::CBuilder
          sudo: false

      # First install Alien::DuckDB to make sure it's properly available
      - name: Install Alien::DuckDB
        uses: perl-actions/install-with-cpm@v1.7
        with:
          install: |
            Alien::DuckDB
          sudo: false
          verbose: true

      # Then build and test the module
      - name: Build and Test
        uses: perl-actions/install-with-cpm@v1.7
        with:
          install: .
          tests: true
          verbose: true
          sudo: false